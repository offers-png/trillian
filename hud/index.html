<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRILLIAN — Mission Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1a3a5c;
    --cyan: #00d4ff;
    --blue: #1b4fd8;
    --green: #00ff88;
    --red: #ff3355;
    --text: #c8d8e8;
    --dim: #4a6a8a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .logo { font-size: 22px; font-weight: bold; letter-spacing: 8px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }
  .version { color: var(--dim); font-size: 11px; }
  .status-pill { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.processing { background: var(--cyan); animation: spin 1s linear infinite; }
  .dot.offline { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* GRID */
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto 220px 1fr; gap: 12px; padding: 12px; height: calc(100vh - 56px); }

  /* PANELS */
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow: hidden; display: flex; flex-direction: column; }
  .panel-title { font-size: 10px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  /* ARC REACTOR */
  .arc-reactor-panel { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .arc { position: relative; width: 120px; height: 120px; }
  .arc-ring { position: absolute; border-radius: 50%; border: 2px solid transparent; }
  .arc-ring-1 { inset: 0; border-color: var(--cyan); opacity: 0.3; animation: rotate 8s linear infinite; }
  .arc-ring-2 { inset: 10px; border-top-color: var(--cyan); border-right-color: var(--cyan); animation: rotate 4s linear infinite reverse; }
  .arc-ring-3 { inset: 20px; border-bottom-color: var(--blue); animation: rotate 2s linear infinite; }
  .arc-core { position: absolute; inset: 35px; border-radius: 50%; background: radial-gradient(circle, var(--cyan) 0%, var(--blue) 50%, transparent 100%); box-shadow: 0 0 30px var(--cyan); animation: core-pulse 2s ease-in-out infinite; }
  .arc-core.active { animation: core-pulse-fast 0.5s ease-in-out infinite; }
  @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes core-pulse { 0%,100%{opacity:0.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
  @keyframes core-pulse-fast { 0%,100%{opacity:1;transform:scale(1.15)} 50%{opacity:0.6;transform:scale(0.9)} }
  .arc-label { margin-top: 16px; font-size: 11px; letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; }

  /* TRANSCRIPT */
  .camera-panel { grid-column: 1 / 4; grid-row: 2; }
  .transcript-panel { grid-column: 1 / 4; grid-row: 3; }
  .transcript { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; max-width: 85%; animation: fadeIn 0.3s ease; }
  .msg.user { background: rgba(27,79,216,0.2); border-left: 3px solid var(--blue); align-self: flex-end; color: #a8c0e0; }
  .msg.trillian { background: rgba(0,212,255,0.08); border-left: 3px solid var(--cyan); align-self: flex-start; color: var(--text); }
  .msg-role { font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; opacity: 0.6; }
  .msg-time { font-size: 10px; opacity: 0.4; float: right; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* STATS PANELS */
  .stats-panel { grid-column: 1; grid-row: 1; }
  .workflows-panel { grid-column: 3; grid-row: 1; }
  .stat { margin-bottom: 12px; }
  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; color: var(--cyan); font-weight: bold; }
  .stat-sub { font-size: 11px; color: var(--dim); }
  .camera-shell {
    position: relative;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #02070d;
    box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.08);
  }
  .camera-feed {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
  }
  .camera-status {
    position: absolute;
    left: 10px;
    bottom: 10px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(8, 12, 16, 0.82);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* WAVEFORM */
  .waveform { display: flex; align-items: center; gap: 2px; height: 32px; margin-top: 8px; }
  .bar { width: 3px; background: var(--cyan); border-radius: 2px; opacity: 0.5; transition: height 0.1s; }
  .bar.active { opacity: 1; animation: wave 0.8s ease-in-out infinite; }
  @keyframes wave { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div class="logo">TRILLIAN</div>
  <div class="version">Voice-First AI OS — v0.1.0</div>
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">ONLINE</span>
  </div>
</header>

<div class="grid">
  <!-- Stats -->
  <div class="panel stats-panel">
    <div class="panel-title">System Status</div>
    <div class="stat">
      <div class="stat-label">Uptime</div>
      <div class="stat-value" id="uptime">00:00:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Conversations Today</div>
      <div class="stat-value" id="convCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current State</div>
      <div class="stat-value" style="font-size:14px" id="currentState">Listening</div>
    </div>
    <div class="waveform" id="waveform">
      <div class="bar" style="height:8px"></div><div class="bar" style="height:14px"></div>
      <div class="bar" style="height:20px"></div><div class="bar" style="height:12px"></div>
      <div class="bar" style="height:24px"></div><div class="bar" style="height:10px"></div>
      <div class="bar" style="height:18px"></div><div class="bar" style="height:8px"></div>
      <div class="bar" style="height:22px"></div><div class="bar" style="height:16px"></div>
    </div>
  </div>

  <!-- Arc Reactor -->
  <div class="panel arc-reactor-panel">
    <div class="arc">
      <div class="arc-ring arc-ring-1"></div>
      <div class="arc-ring arc-ring-2"></div>
      <div class="arc-ring arc-ring-3"></div>
      <div class="arc-core" id="arcCore"></div>
    </div>
    <div class="arc-label" id="arcLabel">Standby</div>
  </div>

  <!-- Workflows -->
  <div class="panel workflows-panel">
    <div class="panel-title">n8n Pipelines</div>
    <div class="stat">
      <div class="stat-label">Total Workflows</div>
      <div class="stat-value" id="wfTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active</div>
      <div class="stat-value" style="color:var(--green)" id="wfActive">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Inactive</div>
      <div class="stat-value" style="color:var(--dim)" id="wfInactive">—</div>
    </div>
    <div class="stat-sub" id="lastCommand" style="margin-top:8px;color:var(--dim);font-size:11px">Last command: —</div>
  </div>

  <div class="panel camera-panel">
    <div class="panel-title">Optic Feed</div>
    <div class="camera-shell">
      <video id="cameraFeed" class="camera-feed" autoplay playsinline muted></video>
      <div class="camera-status" id="cameraStatus">Camera offline</div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="panel transcript-panel">
    <div class="panel-title">Conversation</div>
    <div class="transcript" id="transcript">
      <div class="msg trillian">
        <div class="msg-role">TRILLIAN</div>
        Trillian online. Waiting for your command, Saleh.
      </div>
    </div>
  </div>
</div>

<script>
const ws = new WebSocket('ws://' + location.host);
let convCount = 0;
let startTime = Date.now();
let videoStream = null;
let cameraInitPromise = null;
let selectedCameraLabel = '';
const videoEl = document.getElementById('cameraFeed');
const cameraStatusEl = document.getElementById('cameraStatus');

function setCameraStatus(text) {
  cameraStatusEl.textContent = text;
}

function wait(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function hasLiveVideoTrack(stream) {
  return Boolean(stream?.getVideoTracks?.().some((track) => track.readyState === 'live' && track.enabled !== false));
}

function logVideoDevices(devices) {
  console.log('[CAMERA] Available video devices:');
  devices.forEach((device, index) => {
    console.log('[CAMERA] ' + (index + 1) + '.', {
      label: device.label || '(empty label)',
      deviceId: device.deviceId
    });
  });
}

function stopStream(stream) {
  stream?.getTracks?.().forEach((track) => track.stop());
}

function resetVideoElement(video) {
  try {
    video.pause();
  } catch (error) {}
  video.srcObject = null;
  video.removeAttribute('src');
  video.load();
}

async function getSelectableVideoDevices() {
  let devices = await navigator.mediaDevices.enumerateDevices();
  let videoInputs = devices.filter((device) => device.kind === 'videoinput');
  logVideoDevices(videoInputs);

  const labeledDevices = videoInputs.filter((device) => device.label && device.label.trim());
  if (labeledDevices.length > 0) {
    return labeledDevices;
  }

  console.log('[CAMERA] No labeled video devices found. Requesting permission before re-enumerating.');
  const permissionStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  stopStream(permissionStream);

  devices = await navigator.mediaDevices.enumerateDevices();
  videoInputs = devices.filter((device) => device.kind === 'videoinput');
  logVideoDevices(videoInputs);
  return videoInputs.filter((device) => device.label && device.label.trim());
}

async function waitForRenderedFrames() {
  const startTime = performance.now();
  let lastTime = videoEl.currentTime;

  while (performance.now() - startTime < 5000) {
    if (
      videoEl.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA &&
      videoEl.videoWidth &&
      videoEl.videoHeight &&
      videoEl.currentTime > 0 &&
      videoEl.currentTime !== lastTime
    ) {
      return;
    }

    lastTime = videoEl.currentTime;
    await wait(120);
  }

  throw new Error('Timed out waiting for rendered camera frames');
}

async function attachStreamToVideo(video, stream) {
  resetVideoElement(video);

  video.srcObject = stream;
  video.muted = true;
  video.defaultMuted = true;
  video.playsInline = true;
  video.autoplay = true;
  video.controls = false;
  video.setAttribute('muted', '');
  video.setAttribute('autoplay', '');
  video.setAttribute('playsinline', '');
  video.style.display = 'block';
  video.style.visibility = 'visible';
  video.style.opacity = '1';

  await new Promise((resolve) => {
    if (video.readyState >= HTMLMediaElement.HAVE_METADATA) {
      resolve();
      return;
    }
    video.onloadedmetadata = () => {
      video.onloadedmetadata = null;
      resolve();
    };
  });

  await video.play();
}

function waitForVideoFrame() {
  if (videoEl.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA && videoEl.videoWidth && videoEl.videoHeight && videoEl.currentTime > 0) {
    return Promise.resolve();
  }

  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timed out waiting for camera frame'));
    }, 5000);

    const onReady = () => {
      if (videoEl.videoWidth && videoEl.videoHeight) {
        cleanup();
        resolve();
      }
    };

    const cleanup = () => {
      clearTimeout(timeout);
      videoEl.removeEventListener('loadeddata', onReady);
      videoEl.removeEventListener('canplay', onReady);
      videoEl.removeEventListener('loadedmetadata', onReady);
    };

    videoEl.addEventListener('loadeddata', onReady);
    videoEl.addEventListener('canplay', onReady);
    videoEl.addEventListener('loadedmetadata', onReady);

    if (typeof videoEl.requestVideoFrameCallback === 'function') {
      videoEl.requestVideoFrameCallback(() => {
        onReady();
      });
    }
  });
}

function isFrameMostlyBlack(canvas) {
  const sampleSize = 24;
  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = sampleSize;
  sampleCanvas.height = sampleSize;
  const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
  sampleCtx.drawImage(canvas, 0, 0, sampleSize, sampleSize);

  const { data } = sampleCtx.getImageData(0, 0, sampleSize, sampleSize);
  let totalLuma = 0;
  for (let i = 0; i < data.length; i += 4) {
    totalLuma += 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
  }

  const averageLuma = totalLuma / (data.length / 4);
  return averageLuma < 12;
}

async function captureTrackFrame(track, width, height) {
  if (typeof ImageCapture !== 'function') {
    return null;
  }

  const bitmap = await new ImageCapture(track).grabFrame();
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(bitmap, 0, 0, width, height);
  bitmap.close?.();
  return canvas;
}

async function initCamera() {
  if (videoStream && videoEl.srcObject === videoStream && hasLiveVideoTrack(videoStream)) {
    await waitForVideoFrame();
    await waitForRenderedFrames();
    return videoStream;
  }

  if (cameraInitPromise) {
    return cameraInitPromise;
  }

  cameraInitPromise = (async () => {
    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error('Camera is not supported in this browser');
    }

    setCameraStatus('Connecting camera');

    const labeledDevices = await getSelectableVideoDevices();
    const selectedDevice = labeledDevices[0];
    if (!selectedDevice?.deviceId) {
      throw new Error('No suitable labeled camera found');
    }

    selectedCameraLabel = selectedDevice.label;
    const selectedDeviceId = selectedDevice.deviceId;

    if (videoStream) {
      stopStream(videoStream);
      videoStream = null;
    }

    const video = document.querySelector('#cameraFeed');
    let stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: selectedDeviceId } },
      audio: false
    });

    let track = stream.getVideoTracks()[0];
    console.log('[CAMERA] Opening stream:', {
      label: selectedCameraLabel,
      deviceId: selectedDeviceId,
      readyState: track?.readyState,
      muted: track?.muted,
      enabled: track?.enabled,
      settings: track?.getSettings?.()
    });

    track?.addEventListener('mute', () => console.warn('[CAMERA] Track muted:', track.label));
    track?.addEventListener('unmute', () => console.log('[CAMERA] Track unmuted:', track.label));
    track?.addEventListener('ended', () => console.warn('[CAMERA] Track ended:', track.label));

    videoStream = stream;
    await attachStreamToVideo(video, stream);

    try {
      await waitForVideoFrame();
      await waitForRenderedFrames();
    } catch (error) {
      console.warn('[CAMERA] Initial render failed, retrying same device once:', error.message);
      stopStream(stream);
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: selectedDeviceId } },
        audio: false
      });
      videoStream = stream;
      await attachStreamToVideo(video, stream);
      await waitForVideoFrame();
      await waitForRenderedFrames();
    }

    setCameraStatus('Camera live: ' + selectedCameraLabel);
    return stream;
  })().catch((error) => {
    videoStream = null;
    resetVideoElement(videoEl);
    setCameraStatus('Camera error');
    throw error;
  }).finally(() => {
    cameraInitPromise = null;
  });

  return cameraInitPromise;
}

async function sendCommand(command) {
  addMessage('user', command);

  try {
    const res = await fetch('http://localhost:4001/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command })
    });

    if (!res.ok) {
      const message = await res.text();
      throw new Error(message || 'Command request failed');
    }

    const data = await res.json();

    if (data?.action === 'vision') {
      await initCamera();
      const image = await captureFrame();

      const visionRes = await fetch('http://localhost:4001/api/vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image, command })
      });

      if (!visionRes.ok) {
        const message = await visionRes.text();
        throw new Error(message || 'Vision request failed');
      }

      const visionData = await visionRes.json();

      if (visionData?.reply) addMessage('trillian', visionData.reply);
      else addMessage('trillian', 'Vision failed.');
      return;
    }

    if (data?.reply) {
      addMessage('trillian', data.reply);
      return;
    }

    addMessage('trillian', 'No reply returned.');
  } catch (e) {
    addMessage('trillian', 'Connection error.');
    console.error(e);
  }
}
window.sendCommand = sendCommand;

async function captureFrame() {
  const stream = await initCamera();
  await waitForVideoFrame();
  await waitForRenderedFrames();

  const track = stream.getVideoTracks()[0];
  if (!track || track.readyState !== 'live') {
    throw new Error('Camera track is not live');
  }

  console.log('[CAMERA] Capturing frame from:', selectedCameraLabel || track.label || '(unknown camera)');

  const width = Math.min(videoEl.videoWidth || 1280, 1280);
  const height = Math.max(Math.round(width * ((videoEl.videoHeight || 720) / (videoEl.videoWidth || 1280))), 1);

  for (let attempt = 0; attempt < 4; attempt++) {
    let canvas = null;

    try {
      canvas = await captureTrackFrame(track, width, height);
    } catch (error) {
      canvas = null;
    }

    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoEl, 0, 0, width, height);
    }

    if (!isFrameMostlyBlack(canvas)) {
      return canvas.toDataURL('image/jpeg', 0.92);
    }

    await wait(180);
    await waitForVideoFrame();
  }

  throw new Error('Camera frame is still black');
}
initCamera().catch((error) => {
  console.error('Camera init failed', error);
});
// Uptime counter
setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  document.getElementById('uptime').textContent = h+':'+m+':'+sec;
}, 1000);

// Load initial state
fetch('/state').then(r=>r.json()).then(updateUI).catch(()=>{});

ws.onmessage = (e) => {
  const { event, data } = JSON.parse(e.data);
  if (event === 'state') updateUI(data);
  if (event === 'transcript') addMessage(data.role, data.text);
};

ws.onclose = () => {
  document.getElementById('statusDot').className = 'dot offline';
  document.getElementById('statusText').textContent = 'OFFLINE';
};

function updateUI(s) {
  if (!s) return;
  const dot = document.getElementById('statusDot');
  const arc = document.getElementById('arcCore');
  const arcLabel = document.getElementById('arcLabel');
  const stateEl = document.getElementById('currentState');

  if (s.processing) {
    dot.className = 'dot processing';
    document.getElementById('statusText').textContent = 'PROCESSING';
    arc.classList.add('active');
    arcLabel.textContent = 'Processing';
    stateEl.textContent = 'Thinking...';
    activateWaveform(true);
  } else if (s.listening) {
    dot.className = 'dot';
    document.getElementById('statusText').textContent = 'LISTENING';
    arc.classList.remove('active');
    arcLabel.textContent = 'Listening';
    stateEl.textContent = 'Listening';
    activateWaveform(false);
  }

  if (s.workflows) {
    if (s.workflows.total) document.getElementById('wfTotal').textContent = s.workflows.total;
    if (s.workflows.active) document.getElementById('wfActive').textContent = s.workflows.active;
    if (s.workflows.inactive !== undefined) document.getElementById('wfInactive').textContent = s.workflows.inactive;
  }
  if (s.startedAt) startTime = new Date(s.startedAt).getTime();
}

function addMessage(role, text) {
  convCount++;
  document.getElementById('convCount').textContent = convCount;
  if (role === 'user') document.getElementById('lastCommand').textContent = 'Last command: ' + text.slice(0,40);

  const transcript = document.getElementById('transcript');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'trillian');
  div.innerHTML = '<div class="msg-role">' + (role === 'user' ? 'SALEH' : 'TRILLIAN') + '<span class="msg-time">' + new Date().toLocaleTimeString() + '</span></div>' + text;
  transcript.insertBefore(div, transcript.firstChild);
}

function activateWaveform(active) {
  document.querySelectorAll('.bar').forEach((b,i) => {
    b.className = active ? 'bar active' : 'bar';
    if (active) b.style.animationDelay = (i * 0.1) + 's';
  });
}

// Auto-reconnect
ws.onerror = () => setTimeout(() => location.reload(), 3000);
</script>
</body>
</html>
